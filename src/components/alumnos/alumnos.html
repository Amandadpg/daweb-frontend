<h2>Listado de alumnos</h2>

<table class="tabla">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Apellidos</th>
      <th>iPasen</th>
      <th>Detalle</th>
    </tr>
  </thead>

  <tbody>
    @for (alumno of alumnos; track alumno.id) {
      <tr>
        <td>{{ alumno.id }}</td>
        <td>{{ alumno.nombre }}</td>
        <td>{{ alumno.apellidos }}</td>
        <td>{{ alumno.ipasen }}</td>
        <td><a [routerLink]="['/alumno', alumno.id]" class="btn">Ver</a></td>
      </tr>
    } @empty {
      <tr>
        <td colspan="5" style="text-align: center; padding: 15px;">
          No hay alumnos registrados o cargando datos...
        </td>
      </tr>
    }
  </tbody>
</table>
