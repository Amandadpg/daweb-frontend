<h2>Listado de asignaturas</h2>

<table class="tabla">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Horas</th>
      <th>Detalle</th>
    </tr>
  </thead>

  <tbody>
@for (asignatura of asignaturas; track $index) {
    <tr>
      <td>{{ asignatura.id }}</td>
      <td>{{ asignatura.nombre }}</td>
      <td>{{ asignatura.horas }}</td>
      <td><a [routerLink]="['/asignatura',asignatura.id]" class="btn">Ver</a>
      <a [routerLink]="['/alumno']" class="btn">Alumno</a></td>
    </tr>
  }
  </tbody>
</table>
